<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Baby Tracker" />
  <meta name="description" content="WHO-validated infant growth & milestone tracker" />

  <!-- PWA manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- App icon placeholder (replace with a real 192×192 PNG) -->
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

  <title>Baby Tracker</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    #root { min-height: 100vh; }
  </style>
  <style>
    /* Global mobile responsiveness */
    * { -webkit-tap-highlight-color: transparent; }

    /* Hide scrollbars on tab bar but keep scrollable */
    ::-webkit-scrollbar { display: none; }

    /* Prevent horizontal overflow on body */
    body { overflow-x: hidden; }

    /* Inputs and buttons feel native on mobile */
    input, button, select, textarea {
      font-size: 16px !important; /* prevents iOS zoom on focus */
      -webkit-appearance: none;
    }

    /* Safe area insets for notched phones */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }

    @media (max-width: 480px) {
      /* Tighten padding on small screens */
      .mob-pad { padding: 12px 10px !important; }

      /* Stack any flex row that contains long content */
      .mob-stack { flex-direction: column !important; }

      /* Full width buttons on mobile */
      .mob-full { width: 100% !important; }
    }
  </style>
</head>
<body>
  <noscript>You need JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>
</html>
